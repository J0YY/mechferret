name: Feature request
description: Propose a user-facing improvement or research workflow addition.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the workflow, artifact, or research capability this would improve.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or research workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should MechFerret do instead?
    validations:
      required: true
  - type: textarea
    id: offline
    attributes:
      label: Offline path
      description: How should this work without API keys, GPUs, Modal, or cluster access?
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts and verification
      description: Which reports, JSON payloads, bundles, audits, or tests should prove the feature works?
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This preserves the existing CLI JSON contracts or describes a compatible migration.
        - label: This keeps optional providers and compute backends optional.
