name: Bug report
description: Report a reproducible problem in MechFerret.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone to reproduce it from a fresh checkout or install.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, inputs, and files needed to reproduce the issue.
      placeholder: |
        python3 -m mechferret doctor --strict
        python3 -m mechferret selftest --report runs/selftest/selftest.json
        python3 -m mechferret quickstart --mode ci --json
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Attach or paste the redacted `runs/selftest/selftest.json` payload from `make support`.
      placeholder: |
        make support
        runs/selftest/selftest.json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stderr/stdout snippets, JSON payloads, or artifact paths when useful.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, install method, provider/backend, and whether optional extras are installed.
      placeholder: |
        Python:
        OS:
        Install method:
        Command provider/backend:
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I ran `python3 -m mechferret doctor --strict`.
        - label: I ran `make support` and attached or summarized `runs/selftest/selftest.json`.
        - label: I checked whether the issue reproduces without optional API keys or GPU backends.
